<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO PART SYSTEM - Full Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #05080f; color: #f0f6fc; overflow: hidden; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .hoja-pdf { 
            background: white; color: black; 
            width: 100%; max-width: 900px; min-height: 1100px; 
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.3); 
            margin: 0 auto; padding: 45px; position: relative;
        }
        .tag-diag { background: #991b1b; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .tag-master { background: #1e3a8a; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-[#010409] border-b border-blue-900 p-3 flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <i class="fas fa-atom text-cyan-400 text-2xl animate-spin-slow"></i>
            <h1 class="font-tech text-lg font-bold text-white tracking-widest">PRO PART <span class="text-red-600">SYSTEM</span></h1>
        </div>
        <div class="flex gap-4">
            <div id="status-master" class="text-[10px] text-gray-500"><i class="fas fa-circle"></i> Master DB</div>
            <div id="status-diag" class="text-[10px] text-gray-500"><i class="fas fa-circle"></i> Diag DB</div>
        </div>
    </header>

    <nav class="bg-[#0d1117] border-b border-gray-800 p-4 flex gap-3 shadow-2xl">
        <div class="flex-1 relative">
            <input type="text" id="main-search" placeholder="Buscar falla, código DTC, marca o componente..." 
                   class="w-full bg-gray-900 border border-blue-500/30 rounded-lg p-3 pl-10 text-white focus:outline-none focus:border-cyan-500 transition-all">
            <i class="fas fa-bolt absolute left-3 top-4 text-cyan-500"></i>
        </div>
        <button onclick="superBusqueda()" class="bg-gradient-to-r from-blue-700 to-blue-900 hover:from-blue-600 hover:to-cyan-600 px-8 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2">
            <i class="fas fa-search-plus"></i> ESCANEAR BASE
        </button>
    </nav>

    <main class="flex-1 overflow-y-auto p-6 bg-slate-950">
        <div id="idle-screen" class="h-full flex flex-col items-center justify-center text-gray-700">
            <i class="fas fa-network-wired text-8xl mb-6 opacity-10"></i>
            <p class="font-tech text-2xl tracking-tighter opacity-30">ESPERANDO ORDEN DEL COMANDANTE MILLÁN</p>
        </div>

        <div id="output-report" class="hidden">
            <div class="hoja-pdf">
                <div class="flex justify-between border-b-4 border-black pb-4 mb-6">
                    <div>
                        <h2 class="text-4xl font-black tracking-tighter">REPORT <span class="text-red-700">P.P.S.</span></h2>
                        <p class="text-xs font-bold text-gray-600">REFACCIONARIA Y TALLER ELÉCTRICO MILLÁN</p>
                    </div>
                    <div class="text-right text-xs">
                        <p><strong>FECHA:</strong> <span id="current-date"></span></p>
                        <p><strong>UBICACIÓN:</strong> CUERNAVACA, MOR.</p>
                        <p><strong>TEL:</strong> 777 683 81 96</p>
                    </div>
                </div>

                <div id="render-area">
                    </div>

                <div class="absolute bottom-10 left-10 right-10 flex justify-between items-end border-t border-gray-300 pt-4">
                    <div class="text-center">
                        <p style="font-family: 'Brush Script MT', cursive; font-size: 30px;" class="text-blue-800">Fernando Millán</p>
                        <div class="w-48 border-t border-black mx-auto"></div>
                        <p class="text-[10px] font-bold">FIRMA AUTORIZADA</p>
                    </div>
                    <p class="text-[9px] text-gray-400">Software Pro Part System v2.5 - Conectado a Repositorio GitHub</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const RAW_MASTER = "https://raw.githubusercontent.com/84-fmill-mel30/base_datos_master.json/main/master_data.json";
        const RAW_DIAG = "https://raw.githubusercontent.com/84-fmill-mel30/base_datos_master.json/main/diagn%C3%B3sticos.json";

        let db_master = [];
        let db_diag = [];

        // Carga inicial de ambas bases
        async function conectarBases() {
            try {
                const [res1, res2] = await Promise.all([fetch(RAW_MASTER), fetch(RAW_DIAG)]);
                db_master = await res1.json();
                db_diag = await res2.json();
                
                document.getElementById('status-master').classList.replace('text-gray-500', 'text-green-500');
                document.getElementById('status-diag').classList.replace('text-gray-500', 'text-green-500');
            } catch (e) {
                console.error("Error conectando bases", e);
            }
        }

        function superBusqueda() {
            const query = document.getElementById('main-search').value.toLowerCase();
            if(!query) return;

            document.getElementById('idle-screen').classList.add('hidden');
            document.getElementById('output-report').classList.remove('hidden');
            document.getElementById('current-date').innerText = new Date().toLocaleDateString();

            // Filtrar en Master Data
            const resultsMaster = db_master.filter(i => 
                Object.values(i).some(val => String(val).toLowerCase().includes(query))
            );

            // Filtrar en Diagnósticos
            const resultsDiag = db_diag.filter(i => 
                Object.values(i).some(val => String(val).toLowerCase().includes(query))
            );

            renderReport(resultsMaster, resultsDiag);
        }

        function renderReport(master, diag) {
            const area = document.getElementById('render-area');
            let html = "";

            if(master.length === 0 && diag.length === 0) {
                area.innerHTML = "<h3 class='text-red-600 font-bold'>NO SE ENCONTRÓ INFORMACIÓN EN NINGUNA BASE.</h3>";
                return;
            }

            // SECCIÓN DIAGNÓSTICOS (Prioridad: La experiencia)
            if(diag.length > 0) {
                html += `<div class="mb-6"><span class="tag-diag">MÓDULO DE SOLUCIONES</span>`;
                diag.forEach(d => {
                    html += `
                        <div class="mt-2 p-4 bg-red-50 border-2 border-red-200 rounded-lg">
                            <h4 class="font-bold text-red-900 text-lg uppercase">${d.falla || 'Falla General'}</h4>
                            <p class="text-sm mt-1"><strong>SÍNTOMA:</strong> ${d.sintoma || 'N/A'}</p>
                            <p class="text-sm mt-1"><strong>SOLUCIÓN TÉCNICA:</strong> <span class="text-green-700 font-bold">${d.solucion || 'N/A'}</span></p>
                            ${d.dtc ? `<p class="text-xs mt-2 bg-white inline-block p-1 border">DTC: ${d.dtc}</p>` : ''}
                        </div>
                    `;
                });
                html += `</div>`;
            }

            // SECCIÓN MASTER (Pinouts y Datos Técnicos)
            if(master.length > 0) {
                html += `<div><span class="tag-master">DATOS TÉCNICOS Y PINOUTS</span>`;
                master.forEach(m => {
                    html += `
                        <div class="mt-2 p-3 border-b border-gray-200 grid grid-cols-2 gap-2 text-xs">
                            <div class="col-span-2 bg-gray-100 p-1 font-bold">${m.componente} - ${m.sistema}</div>
                            <div><strong>PIN:</strong> <span class="text-blue-700 font-bold">${m.pin || 'N/A'}</span></div>
                            <div><strong>COLOR:</strong> ${m.color || 'N/A'}</div>
                            <div><strong>ORIGEN:</strong> ${m.ruta_origen || 'N/A'}</div>
                            <div><strong>PRUEBA:</strong> ${m.prueba || 'N/A'}</div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            area.innerHTML = html;
        }

        conectarBases();
    </script>
</body>
</html>
