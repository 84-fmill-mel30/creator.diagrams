<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO PART SYSTEM - DRIVE UNIFIED V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #05080f; color: #f0f6fc; }
        .font-tech { font-family: 'Orbitron', sans-serif; }
        .hoja-pdf { 
            background: white; color: black; width: 100%; max-width: 900px; min-height: 1100px; 
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.3); margin: 20px auto; padding: 45px; position: relative;
        }
        .btn-drive { background: #107c10; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-drive:hover { background: #159d15; transform: scale(1.05); }
        @media print { .no-print { display: none !important; } .hoja-pdf { box-shadow: none; margin: 0; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-[#010409] border-b border-blue-900 p-3 flex justify-between items-center z-20 no-print">
        <div class="flex items-center gap-3">
            <i class="fas fa-network-wired text-cyan-400 text-3xl"></i>
            <div>
                <h1 class="font-tech text-xl font-bold text-white tracking-widest uppercase">PRO PART <span class="text-red-600">SYSTEM</span></h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase">Buscador Unificado: GitHub + Drive</p>
            </div>
        </div>
        <div class="text-[10px] text-green-500 font-bold"><i class="fas fa-shield-check"></i> CONEXIÓN SEGURA</div>
    </header>

    <nav class="bg-[#0d1117] border-b border-gray-800 p-3 flex flex-col gap-3 shadow-2xl no-print">
        <div class="flex gap-3">
            <div class="flex-1 flex items-center bg-gray-900 border border-blue-900/50 rounded-lg overflow-hidden">
                <input type="text" id="main-search" placeholder="Escribe: Alternador, Hilux, Sentra..." class="w-full bg-transparent p-3 text-sm text-white focus:outline-none">
                <button onclick="superBusqueda()" class="bg-blue-700 hover:bg-blue-600 px-8 py-2 font-bold transition"><i class="fas fa-search"></i></button>
            </div>
        </div>
        
        <div class="flex gap-2 justify-center bg-slate-900/50 p-2 rounded-lg">
            <button onclick="setVista('normal')" class="text-[10px] bg-slate-800 px-4 py-1 rounded border border-slate-600">NORMAL</button>
            <button onclick="setVista('ampliado')" class="text-[10px] bg-slate-800 px-4 py-1 rounded border border-slate-600">AMPLIADO</button>
            <button onclick="setVista('diagramas')" class="text-[10px] bg-slate-800 px-4 py-1 rounded border border-slate-600">DIAGRAMAS</button>
        </div>
    </nav>

    <main class="flex-1 p-6 bg-slate-950 overflow-y-auto">
        <div id="drive-helper" class="hidden mb-6 text-center no-print">
            <p class="text-xs text-gray-400 mb-2 font-bold uppercase italic">¿No es suficiente? Busca en tus manuales personales:</p>
            <button id="drive-link-btn" onclick="buscarEnDrive()" class="btn-drive shadow-lg">
                <i class="fab fa-google-drive"></i> BUSCAR "<span id="search-term-display"></span>" EN MI DRIVE
            </button>
        </div>

        <div id="output-report" class="hidden">
            <div class="hoja-pdf">
                <div id="render-area"></div>
            </div>
        </div>
    </main>

    <script>
        const RAW_MASTER = "https://raw.githubusercontent.com/84-fmill-mel30/base_datos_master.json/main/master_data.json";
        let db = [];
        let vistaActual = 'normal';

        async function cargar() {
            try {
                const res = await fetch(RAW_MASTER + '?v=' + Date.now());
                db = await res.json();
            } catch (e) { console.log("Error de carga"); }
        }

        function buscarEnDrive() {
            const q = document.getElementById('main-search').value;
            // Abre una pestaña nueva buscando en tu Drive
            window.open(`https://drive.google.com/drive/search?q=${encodeURIComponent(q)}`, '_blank');
        }

        function superBusqueda() {
            const q = document.getElementById('main-search').value.toLowerCase();
            if(!q) return;

            // Mostrar el ayudante de Drive
            document.getElementById('drive-helper').classList.remove('hidden');
            document.getElementById('search-term-display').innerText = q.toUpperCase();
            document.getElementById('output-report').classList.remove('hidden');

            const lista = db.filter(i => JSON.stringify(i).toLowerCase().includes(q));
            render(lista);
        }

        function setVista(v) { vistaActual = v; superBusqueda(); }

        function render(lista) {
            const area = document.getElementById('render-area');
            let h = "";
            if(lista.length === 0) {
                h = `<div class="p-10 text-center">
                        <i class="fas fa-search-minus text-4xl text-gray-300 mb-4"></i>
                        <h2 class="text-xl font-bold">Sin resultados en la Base Master</h2>
                        <p class="text-sm text-gray-500">Usa el botón verde de arriba para buscar en tu Drive personal.</p>
                     </div>`;
            } else {
                lista.forEach(i => {
                    h += `<div class="mb-10 border-b pb-6">
                        <h3 class="text-2xl font-black text-blue-900">${i.marca || ''} ${i.modelo || ''}</h3>
                        <div class="${vistaActual === 'diagramas' ? 'hidden' : 'grid'} grid-cols-2 gap-2 mt-4 text-xs">
                            <div class="bg-gray-100 p-2"><strong>COMPONENTE:</strong> ${i.componente || i.name || 'N/A'}</div>
                            <div class="bg-gray-100 p-2"><strong>PINOUT:</strong> ${i.pin || i.n || 'N/A'}</div>
                        </div>
                        ${i.diagrama ? `<img src="${i.diagrama}" class="w-full mt-4 border shadow-md">` : ''}
                    </div>`;
                });
            }
            area.innerHTML = h;
        }

        cargar();
    </script>
</body>
</html>
